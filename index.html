  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECEIVER - MontCode™</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-mono p-4 md:p-10 min-h-screen">

    <div class="max-w-3xl mx-auto">
        <div class="mb-6 flex flex-col md:flex-row md:items-end justify-between border-b border-zinc-800 pb-4">
            <div>
                <h1 class="text-[#ccff00] text-2xl font-black italic uppercase leading-none tracking-tighter">
                    > MONTCODE MONITOR
                </h1>
                <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.3em] mt-2">Direct Tactical Feed</p>
            </div>
            <div id="connection-status" class="mt-4 md:mt-0 text-[9px] bg-zinc-900 px-3 py-1 rounded-full border border-zinc-800 text-[#ccff00] font-bold uppercase tracking-widest">
                CONNECTED
            </div>
        </div>
        
        <div id="log-console" class="bg-zinc-950 border border-zinc-900 p-4 h-[500px] overflow-y-auto text-[11px] shadow-2xl rounded-2xl">
            <p class="text-zinc-700 italic opacity-50">[SYSTEM] Awaiting pulse...</p>
        </div>
    </div>

    <script>
        const logConsole = document.getElementById('log-console');

        function addLog(msg, color = "#fff") {
            const p = document.createElement('p');
            p.className = "mb-2 border-l-2 border-zinc-900 pl-3 py-1";
            p.style.color = color;
            const time = new Date().toLocaleTimeString();
            p.innerHTML = `<span class="text-zinc-800 text-[9px] font-bold mr-2">${time}</span> ${msg}`;
            logConsole.appendChild(p);
            logConsole.scrollTop = logConsole.scrollHeight;
        }

        const pusher = new Pusher('284fc98940a4b6d4c359', { cluster: 'us2', forceTLS: true });
        const channel = pusher.subscribe('rescue-TEST-ID');
        
        channel.bind('new-reading', function(data) {
            // Recibe directamente el campo 'text' enviado por el Sender
            const info = data.text || data.message || "No Data";
            addLog("PULSE RECEIVED: " + info, "#ccff00");
        });

        addLog("RECEIVER ACTIVE ON CHANNEL: rescue-TEST-ID", "#444");
    </script>
</body>
</html>
