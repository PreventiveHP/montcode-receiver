 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONTCODE - VITAL STREAM MONITOR v6.3</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .neon-border { box-shadow: 0 0 15px rgba(204, 255, 0, 0.1), inset 0 0 10px rgba(204, 255, 0, 0.05); }
        .glass-panel { background: linear-gradient(145deg, #121212, #080808); border: 1px solid #222; }
        .depth-card { box-shadow: 10px 10px 20px #050505, -5px -5px 15px #151515; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#050505] text-zinc-300 font-mono p-6 min-h-screen">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8 border-b border-zinc-800/50 pb-6">
            <div class="flex items-center gap-6">
                <div class="w-16 h-16 bg-[#ccff00] flex items-center justify-center rounded-xl shadow-[0_0_20px_rgba(204,255,0,0.2)]">
                    <span class="text-black font-black text-2xl">M</span>
                </div>
                <div>
                    <h1 class="text-[#ccff00] text-3xl font-black italic tracking-tighter uppercase leading-none">
                        MONTCODE<span class="text-white ml-2 opacity-80">PROVIDER STATION</span>
                    </h1>
                    <p class="text-[10px] text-zinc-400 uppercase tracking-[0.2em] mt-1 font-bold italic">
                        Real-Time Clinical Triage Node
                    </p>
                </div>
            </div>
            <div class="text-right flex flex-col items-end gap-2">
                <span id="state-text" class="text-[10px] font-bold uppercase px-4 py-1.5 bg-zinc-900 border border-zinc-800 rounded-md text-yellow-500">LINK SEARCHING...</span>
                <p class="text-[9px] text-zinc-600 font-bold uppercase tracking-widest">ENCRYPTION: LOCAL_AES_P2P</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass-panel depth-card p-6 rounded-3xl relative overflow-hidden">
                        <p class="text-[10px] text-zinc-500 uppercase font-black tracking-widest italic mb-4">> HEMODYNAMICS</p>
                        <div class="flex items-baseline gap-2 mb-4">
                            <span id="last-bp" class="text-6xl font-black text-[#00ffff] tracking-tighter drop-shadow-[0_0_15px_rgba(0,255,255,0.3)]">--/--</span>
                            <span class="text-xs text-zinc-600 font-bold italic">mmHg</span>
                        </div>
                        <div class="h-32 w-full bg-black/40 rounded-xl p-2 border border-zinc-800/50">
                            <canvas id="bpChart"></canvas>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mt-4 text-[10px] border-t border-zinc-800/50 pt-4 font-bold uppercase text-zinc-500">
                            <div>AVG SYS: <span id="avg-sys" class="text-white ml-1">--</span></div>
                            <div>MAP: <span id="map-val" class="text-cyan-500 ml-1">--</span></div>
                        </div>
                    </div>

                    <div class="glass-panel depth-card p-6 rounded-3xl relative overflow-hidden">
                        <p class="text-[10px] text-zinc-500 uppercase font-black tracking-widest italic mb-4">> METABOLIC</p>
                        <div class="flex items-baseline gap-2 mb-4">
                            <span id="last-glu" class="text-6xl font-black text-[#ccff00] tracking-tighter drop-shadow-[0_0_15px_rgba(204,255,0,0.3)]">---</span>
                            <span class="text-xs text-zinc-600 font-bold italic">mg/dL</span>
                        </div>
                        <div class="h-32 w-full bg-black/40 rounded-xl p-2 border border-zinc-800/50">
                            <canvas id="gluChart"></canvas>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mt-4 text-[10px] border-t border-zinc-800/50 pt-4 font-bold uppercase text-zinc-500">
                            <div>AVG GLU: <span id="avg-glu" class="text-white ml-1">--</span></div>
                            <div>EST. A1C: <span id="a1c-val" class="text-[#ccff00] ml-1">--%</span></div>
                        </div>
                    </div>
                </div>

                <div class="glass-panel rounded-3xl p-6 border-l-4 border-blue-500">
                    <div class="flex justify-between items-center mb-4">
                        <p class="text-[10px] text-blue-500 font-black uppercase tracking-[0.2em] italic">Tactical Feedback Sender</p>
                        <button onclick="sendFeedback()" id="btn-send-feedback" class="bg-blue-600 hover:bg-blue-500 text-white text-[9px] font-black px-6 py-2 rounded-lg transition-all uppercase flex items-center gap-2">
                            <span>Execute Command</span>
                            <div id="loader-feedback" class="hidden w-2 h-2 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
                        </button>
                    </div>
                    <textarea id="dr-feedback" class="w-full bg-black/50 border border-zinc-800 rounded-xl p-4 text-xs text-white focus:outline-none focus:border-blue-500 transition-colors h-20 placeholder-zinc-700" placeholder="E.g. Add Losartan 50mg / Hydration Protocol..."></textarea>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-4">
                <div class="glass-panel depth-card p-6 rounded-3xl border-t-2 border-t-[#ccff00]">
                    <h3 class="text-xs font-black text-white mb-6 uppercase tracking-tighter italic">Patient Insights</h3>
                    <div id="patient-notes-terminal" class="bg-black/50 border border-zinc-900 rounded-2xl h-[440px] overflow-y-auto p-4 space-y-3">
                        <div id="notes-content" class="text-[10px] space-y-2">
                            <p class="text-zinc-700 text-center italic mt-10">Listening for secure data stream...</p>
                        </div>
                    </div>
                </div>

                <button onclick="clearLogs()" class="w-full bg-zinc-900/50 border border-zinc-800 text-zinc-600 hover:text-red-500 font-bold py-3 rounded-xl transition-all uppercase text-[8px] tracking-widest">
                    Purge Local Records
                </button>
            </div>
        </div>
    </div>

    <script>
        let bpHistory = JSON.parse(localStorage.getItem('montcode_bp_history')) || [];
        let gluHistory = JSON.parse(localStorage.getItem('montcode_glu_history')) || [];
        let charts = {};

        // CONFIG PUSHER
        const pusher = new Pusher('284fc98940a4b6d4c359', { cluster: 'us2' });
        const channel = pusher.subscribe("test-channel");

        function initCharts() {
            const config = (color) => ({
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderColor: color, borderWidth: 2, tension: 0.4, pointRadius: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
            });
            charts.bp = new Chart(document.getElementById('bpChart'), config('#00ffff'));
            charts.glu = new Chart(document.getElementById('gluChart'), config('#ccff00'));
            bpHistory.forEach(d => updateChart(charts.bp, d.sys, d.time));
            gluHistory.forEach(d => updateChart(charts.glu, d.val, d.time));
        }

        function updateChart(chart, val, timeLabel) {
            chart.data.labels.push(timeLabel);
            chart.data.datasets[0].data.push(val);
            if (chart.data.labels.length > 15) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
            chart.update('none');
        }

        // --- ENVIAR AL PACIENTE (FEEDBACK) ---
        async function sendFeedback() {
            const text = document.getElementById('dr-feedback').value;
            if (!text) return;
            const btn = document.getElementById('btn-send-feedback');
            const loader = document.getElementById('loader-feedback');
            btn.disabled = true; loader.classList.remove('hidden');

            try {
                await fetch('https://api.pusher.com/apps/1897282/events', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: "test-event",
                        channel: "test-channel",
                        data: { text: `CMD:FEEDBACK|MSG:${text}` }
                    })
                });
                document.getElementById('dr-feedback').value = "";
            } catch (e) { console.error(e); }
            finally { btn.disabled = false; loader.classList.add('hidden'); }
        }

        // --- RECEPTOR INTEGRADO: DETECTA CÁPSULA Y VITALES ---
        channel.bind('test-event', function(data) {
            const content = data.text || data.message || "";
            if (!content || content.includes("CMD:FEEDBACK")) return;

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            if (content.includes("CMD:BP")) {
                const parts = content.split('|');
                const sys = parts[1].split(':')[1];
                const dia = parts[2].split(':')[1];
                bpHistory.push({ time, sys, dia });
                localStorage.setItem('montcode_bp_history', JSON.stringify(bpHistory));
                updateChart(charts.bp, sys, time);
            } 
            else if (content.includes("CMD:GLU")) {
                const val = content.split('|')[1].split(':')[1];
                gluHistory.push({ time, val });
                localStorage.setItem('montcode_glu_history', JSON.stringify(gluHistory));
                updateChart(charts.glu, val, time);
            } 
            else {
                // LÓGICA DE NOTA + DETECCIÓN DE CÁPSULA
                const notesDiv = document.getElementById('notes-content');
                if (notesDiv.innerText.includes("Listening")) notesDiv.innerHTML = "";
                
                // Si menciona Losartan o mg, le ponemos el icono de cápsula
                const isMed = content.toLowerCase().includes('losartan') || content.toLowerCase().includes('mg');
                const medIcon = isMed ? '<span class="text-[#ccff00] text-lg">💊</span>' : '';
                const borderColor = isMed ? 'border-[#ccff00]' : 'border-zinc-800';

                notesDiv.innerHTML = `
                    <div class="bg-zinc-900/80 p-3 rounded-xl border-l-4 ${borderColor} animate-pulse-once">
                        <div class="flex justify-between items-start">
                            <span class="text-[8px] text-zinc-600 font-bold">${time}</span>
                            ${medIcon}
                        </div>
                        <p class="text-white mt-1 leading-relaxed">${content}</p>
                    </div>
                ` + notesDiv.innerHTML;
            }
            updateUI();
        });

        function updateUI() {
            if(bpHistory.length > 0) {
                const last = bpHistory[bpHistory.length - 1];
                document.getElementById('last-bp').innerText = `${last.sys}/${last.dia}`;
                const avgSys = Math.round(bpHistory.reduce((a,b)=>a+parseInt(b.sys),0)/bpHistory.length);
                document.getElementById('avg-sys').innerText = avgSys;
            }
            if(gluHistory.length > 0) {
                const last = gluHistory[gluHistory.length - 1];
                document.getElementById('last-glu').innerText = last.val;
                const avgGlu = Math.round(gluHistory.reduce((a,b)=>a+parseInt(b.val),0)/gluHistory.length);
                document.getElementById('a1c-val').innerText = ((46.7 + avgGlu) / 28.7).toFixed(1) + "%";
                document.getElementById('avg-glu').innerText = avgGlu;
            }
        }

        function clearLogs() { if(confirm("PERMANENTLY PURGE DATA?")) { localStorage.clear(); location.reload(); } }
        
        pusher.connection.bind('state_change', (s) => {
            const t = document.getElementById('state-text');
            t.innerText = s.current.toUpperCase();
            t.style.color = s.current === 'connected' ? "#ccff00" : "#f59e0b";
        });

        window.onload = () => { initCharts(); updateUI(); };
    </script>
</body>
</html>
