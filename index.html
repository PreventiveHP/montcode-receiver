 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECEIVER SECURE - MontCode™</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-mono p-4 md:p-10 min-h-screen">

    <div class="max-w-3xl mx-auto">
        <div class="mb-6 flex flex-col md:flex-row md:items-end justify-between border-b border-zinc-800 pb-4">
            <div>
                <h1 class="text-[#ccff00] text-2xl font-black italic uppercase leading-none tracking-tighter">
                    > MONTCODE SECURE BRIDGE
                </h1>
                <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.3em] mt-2">End-to-End Encryption (E2EE)</p>
            </div>
            <div id="connection-status" class="mt-4 md:mt-0 text-[9px] bg-zinc-900 px-3 py-1 rounded-full border border-zinc-800 text-yellow-500 font-bold uppercase tracking-widest">
                Connecting...
            </div>
        </div>
        
        <div id="log-console" class="bg-zinc-950 border border-zinc-900 p-4 h-[60vh] md:h-[500px] overflow-y-auto text-[11px] shadow-2xl rounded-2xl custom-scrollbar">
            <p class="text-zinc-700 italic opacity-50">[SYSTEM] Initialization complete. Awaiting tactical pulse...</p>
        </div>

        <div class="mt-4 flex justify-between items-center text-[9px] text-zinc-600 uppercase tracking-[0.2em] font-bold">
            <span>Security: AES-256</span>
            <span id="active-channels">Monitoring: 2 Channels</span>
        </div>
    </div>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #000; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>

    <script>
        // 1. CONFIGURACIÓN
        const SECRET_PHRASE = "MONTCODE-MED-2026";
        const logConsole = document.getElementById('log-console');
        const statusBadge = document.getElementById('connection-status');

        function addLog(msg, color = "#555") {
            const p = document.createElement('p');
            p.className = "mb-2 border-l-2 border-zinc-900 pl-3 py-1";
            p.style.color = color;
            const time = new Date().toLocaleTimeString([], { hour12: false });
            p.innerHTML = `<span class="text-zinc-800 text-[9px] font-bold mr-2">${time}</span> ${msg}`;
            logConsole.appendChild(p);
            logConsole.scrollTop = logConsole.scrollHeight;
        }

        // 2. INICIALIZAR PUSHER
        const pusher = new Pusher('284fc98940a4b6d4c359', { 
            cluster: 'us2', 
            forceTLS: true 
        });

        // Monitorear conexión
        pusher.connection.bind('state_change', (states) => {
            statusBadge.innerText = states.current.toUpperCase();
            if(states.current === 'connected') {
                statusBadge.className = "text-[#ccff00] bg-[#ccff00]/10 border-[#ccff00]/20 px-3 py-1 rounded-full text-[9px] font-bold uppercase tracking-widest";
                addLog("SECURE LINK ESTABLISHED", "#ccff00");
            }
        });

        // 3. PROCESADOR DE DATOS (Radar Universal)
        const procesarDato = function(data) {
            // Buscamos el dato en cualquier campo posible enviado por el Relay
            const encryptedData = data.message || data.text || data.provider || data.payload;
            
            if (!encryptedData) {
                addLog("WARN: Received packet with no payload", "#ff3b3b");
                return;
            }

            addLog("INCOMING PULSE DETECTED...", "#444");

            try {
                // INTENTO DE DESCIFRADO
                const bytes = CryptoJS.AES.decrypt(encryptedData, SECRET_PHRASE);
                const originalText = bytes.toString(CryptoJS.enc.Utf8);

                if(!originalText) throw new Error("Invalid Key");

                // ÉXITO: MOSTRAR MENSAJE MÉDICO
                addLog("DECRYPTED SUCCESS:", "#ccff00");
                addLog(`<span class="text-white text-sm font-bold">${originalText}</span>`, "#fff");
                addLog("------------------------------------------", "#111");
                
            } catch (e) {
                // FALLBACK: Si no se puede descifrar, mostramos el RAW para diagnóstico
                addLog("RAW DATA (NOT DECRYPTED): " + encryptedData, "#333");
            }
        };

        // 4. ESCUCHA DE CANALES (test-channel para compatibilidad y rescue-TEST-ID para el futuro)
        const channel1 = pusher.subscribe('rescue-TEST-ID');
        const channel2 = pusher.subscribe('test-channel');

        const eventos = ['new-reading', 'message', 'reading'];

        [channel1, channel2].forEach(chan => {
            eventos.forEach(evt => {
                chan.bind(evt, procesarDato);
            });
        });

        addLog("RADAR ACTIVE: Listening on test-channel & rescue-TEST-ID", "#222");
    </script>
</body>
</html>
