 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECEIVER TACTICAL - MontCode™</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-mono p-6 min-h-screen transition-colors duration-200">

    <div class="max-w-2xl mx-auto">
        <h1 class="text-[#ccff00] text-xl font-black italic mb-4 uppercase tracking-tighter">
            > MONTCODE BRIDGE DEBUGGER v5.9 [DUAL SUCTION]
        </h1>
        
        <div id="status" class="bg-zinc-900 p-4 border border-zinc-800 rounded-t-xl flex justify-between items-center">
            <span class="text-[10px] text-zinc-500 uppercase tracking-widest">System Status:</span>
            <span id="state-text" class="text-yellow-500 font-bold uppercase text-sm animate-pulse">INITIALIZING...</span>
        </div>

        <div id="log-console" class="bg-zinc-950 border-x border-b border-zinc-800 p-4 h-[400px] overflow-y-auto text-[11px] leading-relaxed shadow-2xl">
            <p class="text-zinc-700 italic">[SYSTEM] Awaiting tactical pulse on test-channel...</p>
        </div>

        <div class="mt-4 flex justify-between items-center text-[9px] text-zinc-600 uppercase tracking-widest">
            <span>Cluster: US2</span>
            <span id="channel-name">Channel: test-channel</span>
        </div>
    </div>

    <script>
        // MEMORIA LOCAL PARA TENDENCIAS (BP y GLU)
        let bpHistory = JSON.parse(localStorage.getItem('montcode_bp_history')) || [];
        let gluHistory = JSON.parse(localStorage.getItem('montcode_glu_history')) || [];

        Pusher.logToConsole = true;

        const pusher = new Pusher('284fc98940a4b6d4c359', { 
            cluster: 'us2',
            forceTLS: true
        });

        const logConsole = document.getElementById('log-console');
        const stateText = document.getElementById('state-text');
        const channelDisplay = document.getElementById('channel-name');

        function addLog(msg, color = "#555") {
            const p = document.createElement('p');
            p.className = "mb-1 border-l-2 border-zinc-800 pl-2";
            p.style.color = color;
            const time = new Date().toLocaleTimeString([], { hour12: false });
            p.innerHTML = `<span class="text-zinc-700">[${time}]</span> ${msg}`;
            logConsole.appendChild(p);
            logConsole.scrollTop = logConsole.scrollHeight;
        }

        pusher.connection.bind('state_change', (states) => {
            addLog(`CONNECTION STATE: ${states.current.toUpperCase()}`, "#aaa");
            stateText.innerText = states.current.toUpperCase();
            if(states.current === 'connected') {
                stateText.style.color = "#ccff00";
                stateText.classList.remove('animate-pulse');
            }
        });

        const targetChannel = "test-channel"; 
        const channel = pusher.subscribe(targetChannel);
        channelDisplay.innerText = `Listening: ${targetChannel}`;

        channel.bind('pusher:subscription_succeeded', () => {
            addLog(`SUBSCRIPTION SUCCESS: Active on '${targetChannel}'`, "#ccff00");
        });

        // ESCUCHADOR DE EVENTO 'test-event' CON LÓGICA DUAL
        channel.bind('test-event', function(data) {
            const content = data.text || "";
            
            // Efecto de parpadeo táctico
            document.body.style.backgroundColor = "#111";
            setTimeout(() => { document.body.style.backgroundColor = "#000"; }, 100);

            // 1. DETECCIÓN DE PRESIÓN ARTERIAL (BP)
            if (content.startsWith("CMD:BP")) {
                addLog("!!! BP VITAL SIGN DETECTED !!!", "#00ffff");
                try {
                    const parts = content.split('|');
                    const sysValue = parts[1].split(':')[1];
                    const diaValue = parts[2].split(':')[1];

                    const registro = {
                        time: new Date().toLocaleString(),
                        sys: parseInt(sysValue),
                        dia: parseInt(diaValue)
                    };

                    bpHistory.push(registro);
                    localStorage.setItem('montcode_bp_history', JSON.stringify(bpHistory));
                    addLog(`SUCTION SUCCESS: Saved BP ${sysValue}/${diaValue}`, "#00ffff");
                } catch(e) { addLog("PARSE ERROR: BP data corrupted", "#ff3b3b"); }

            // 2. DETECCIÓN DE GLUCOSA (GLU)
            } else if (content.startsWith("CMD:GLU")) {
                addLog("!!! GLUCOSE DATA DETECTED !!!", "#00ffff");
                try {
                    const parts = content.split('|');
                    const gluValue = parts[1].split(':')[1];

                    const registro = {
                        time: new Date().toLocaleString(),
                        val: parseInt(gluValue)
                    };

                    gluHistory.push(registro);
                    localStorage.setItem('montcode_glu_history', JSON.stringify(gluHistory));
                    addLog(`SUCTION SUCCESS: Saved GLU ${gluValue} mg/dL`, "#00ffff");
                } catch(e) { addLog("PARSE ERROR: GLU data corrupted", "#ff3b3b"); }

            } else {
                // Mensaje de texto o nota médica normal
                addLog(`PAYLOAD: ${content}`, "#fff");
            }
        });

        pusher.connection.bind('error', (err) => {
            addLog("CRITICAL ERROR: " + (err.message || "Pusher failed"), "#ff3b3b");
        });
    </script>
</body>
</html>
