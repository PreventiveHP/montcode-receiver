 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RECEIVER SECURE - MontCode™</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-mono p-6 min-h-screen">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-[#ccff00] text-xl font-black italic mb-4 uppercase leading-tight">> MONTCODE SECURE BRIDGE (E2EE)</h1>
        
        <div id="log-console" class="bg-zinc-950 border border-zinc-800 p-4 h-[450px] overflow-y-auto text-[11px] shadow-2xl rounded-xl">
            <p class="text-zinc-700 italic">[SYSTEM] Awaiting encrypted pulse...</p>
        </div>
    </div>

    <script>
        const SECRET_PHRASE = "MONTCODE-MED-2026";
        const pusher = new Pusher('284fc98940a4b6d4c359', { cluster: 'us2', forceTLS: true });
        const logConsole = document.getElementById('log-console');

        function addLog(msg, color = "#555") {
            const p = document.createElement('p');
            p.className = "mb-2 border-l-2 border-zinc-800 pl-2";
            p.style.color = color;
            p.innerHTML = `<span class="text-zinc-700">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
            logConsole.appendChild(p);
            logConsole.scrollTop = logConsole.scrollHeight;
        }

        const channel = pusher.subscribe('rescue-TEST-ID');
        
        channel.bind('new-reading', function(data) {
            const encryptedData = data.message;
            addLog("RAW DATA RECEIVED: " + encryptedData, "#444"); // Muestra el código cifrado

            try {
                // DESCIFRADO
                const bytes = CryptoJS.AES.decrypt(encryptedData, SECRET_PHRASE);
                const originalText = bytes.toString(CryptoJS.enc.Utf8);

                if(!originalText) throw new Error();

                addLog("DECRYPTED MESSAGE: " + originalText, "#ccff00");
                addLog("------------------------------------------", "#222");
            } catch (e) {
                addLog("ERROR: Could not decrypt message. Security Breach?", "#ff3b3b");
            }
        });
    </script>
</body>
</html>
