 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECEIVER - MontCode™</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-mono p-6 min-h-screen">
    <div class="max-w-3xl mx-auto border-b border-zinc-800 pb-4 mb-6 flex justify-between items-end">
        <h1 class="text-[#ccff00] text-2xl font-black italic uppercase tracking-tighter">> MONITOR ACTIVE</h1>
        <div id="connection-status" class="text-[9px] bg-zinc-900 px-3 py-1 rounded-full text-yellow-500 font-bold uppercase tracking-widest">
            Connecting...
        </div>
    </div>
    
    <div id="log-console" class="bg-zinc-950 border border-zinc-900 p-6 h-[500px] overflow-y-auto text-[14px] rounded-2xl shadow-2xl">
        <p class="text-zinc-700 italic opacity-50">[SYSTEM] Awaiting pulse on test-channel...</p>
    </div>

    <script>
        const logConsole = document.getElementById('log-console');
        const statusBadge = document.getElementById('connection-status');

        function addLog(msg) {
            const p = document.createElement('p');
            p.className = "mb-4 border-l-2 border-[#ccff00] pl-4 py-2 bg-[#ccff00]/5 text-white";
            const time = new Date().toLocaleTimeString();
            p.innerHTML = `<span class="text-zinc-600 text-[10px] block font-bold mb-1">${time}</span> ${msg}`;
            logConsole.appendChild(p);
            logConsole.scrollTop = logConsole.scrollHeight;
        }

        const pusher = new Pusher('284fc98940a4b6d4c359', { cluster: 'us2', forceTLS: true });

        pusher.connection.bind('state_change', (states) => {
            statusBadge.innerText = states.current.toUpperCase();
            if(states.current === 'connected') {
                statusBadge.className = "text-[#ccff00] bg-[#ccff00]/10 px-3 py-1 rounded-full text-[9px] font-bold";
                addLog("TUNNEL ACTIVE - READY FOR DATA");
            }
        });

        // SINTONIZACIÓN EXACTA SEGÚN TU RELAY
        const channel = pusher.subscribe('test-channel');
        channel.bind('test-event', function(data) {
            // El Relay envía el dato dentro del campo 'text'
            const info = data.text || "Pulse Received";
            addLog(info);
        });
    </script>
</body>
</html>
